<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スイカ紹介ページ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍉 スイカ 🍉</h1>
        <p>夏を代表する甘くておいしい果菜</p>
    </header>

    <main>
        <section class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Watermelons.jpghttps://fupo.jp/article/suika-tabegoro/.jpg" alt="スイカ">
        </section>

        <section class="card">
            <h2>スイカの特徴</h2>
            <p>
                スイカはウリ科の果菜で、夏に人気の作物です。
                果実の約90％が水分で、暑い日にぴったりです。
                甘みが強く、ビタミンやミネラルも含まれています。
            </p>
        </section>

        <section class="card">
            <h2>栽培のポイント</h2>
            <ul>
                <li>日当たりの良い場所で育てる</li>
                <li>水はけの良い土を使う</li>
                <li>人工授粉を行うと実がつきやすい</li>
            </ul>
        </section>

        <section class="card">
            <h2>栽培情報</h2>
            <table>
                <tr>
                    <th>項目</th>
                    <th>内容</th>
                </tr>
                <tr>
                    <td>種まき時期</td>
                    <td>3～5月</td>
                </tr>
                <tr>
                    <td>収穫時期</td>
                    <td>7～8月</td>
                </tr>
                <tr>
                    <td>難易度</td>
                    <td>★★★☆☆</td>
                </tr>
            </table>
        </section>

        <section class="buttons">
            <a href="https://www.google.com/url?sa=t&rct=j&q=&esrc=s&source=web&cd=&ved=2ahUKEwjgiZH_3p6VAxVjhK8BHYMtFgMQFnoECBcQAQ&url=https%3A%2F%2Fehm-saijo-ah.esnet.ed.jp%2F&usg=AOvVaw2qk4iPBrBCFBER-UOegpPy&opi=89978449" target="_blank">
                <button>西条農業高校</button>
            </a>

            <a href="https://www.google.com/url?sa=t&rct=j&q=&esrc=s&source=web&cd=&ved=2ahUKEwiNyr_x356VAxXRafUHHSSXLIsQFnoECBsQAQ&url=https%3A%2F%2Fsakata-tsushin.com%2Flesson-vegetable%2Fdetail_36%2F&usg=AOvVaw08dIlnS_z1WuJj0egqsQYk&opi=89978449" target="_blank">
                <button>栽培方法を見る</button>
            </a>
        </section>
    </main>

</html>
