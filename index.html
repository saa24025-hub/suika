<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スイカ紹介ページ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🍉 スイカ 🍉</h1>
        <p>夏を代表する甘くておいしい果菜</p>
    </header>

    <main>
        <section class="card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Watermelons.jpg/https://agri.mynavi.jp/wp-content/uploads/2018/04/8026_suika1.jpg.webp.jpg" alt="スイカ">
        </section>

        <section class="card">
            <h2>スイカの特徴</h2>
            <p>
                スイカはウリ科の果菜で、夏に人気の作物です。
                果実の約90％が水分で、暑い日にぴったりです。
                甘みが強く、ビタミンやミネラルも含まれています。
            </p>
        </section>

        <section class="card">
            <h2>栽培のポイント</h2>
            <ul>
                <li>日当たりの良い場所で育てる</li>
                <li>水はけの良い土を使う</li>
                <li>人工授粉を行うと実がつきやすい</li>
            </ul>
        </section>

        <section class="card">
            <h2>栽培情報</h2>
            <table>
                <tr>
                    <th>項目</th>
                    <th>内容</th>
                </tr>
                <tr>
                    <td>種まき時期</td>
                    <td>3～5月</td>
                </tr>
                <tr>
                    <td>収穫時期</td>
                    <td>7～8月</td>
                </tr>
                <tr>
                    <td>難易度</td>
                    <td>★★★☆☆</td>
                </tr>
            </table>
        </section>

        <section class="buttons">
            <a href="https://www.saijo-ah.ed.jp/" target="_blank">
                <button>西条農業高校</button>
            </a>

            <a href="https://shop.takii.co.jp/smartphone/contents2/sodatekata/vegetable/suika/index.html" target="_blank">
                <button>栽培方法を見る</button>
            </a>
        </section>
    </main>

</body>
</html>
