    <h2>スイカの特徴</h2>

    <p>
        スイカはウリ科の果菜です。
        夏を代表する果物として親しまれています。
        水分が豊富で甘みがあり、暑い季節にぴったりの作物です。
    </p>

    <h2>栽培のポイント</h2>

    <ul>
        <li>日当たりの良い場所で育てる。</li>
        <li>水はけの良い土を使用する。</li>
        <li>人工授粉を行うと実付きが良くなる。</li>
    </ul>

    <h2>栽培情報</h2>

    <table>
        <tr>
            <th>項目</th>

        </tr>

        </tr>
        <tr>
            <td>収穫時期</td>
            <td>7～8月</td>
        </tr>
        <tr>
            <td>難易度</td>
            <td>★★★☆☆</td>
        </tr>
    </table>
